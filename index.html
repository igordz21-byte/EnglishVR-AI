<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EnglishVR AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="background">

    <div id="overlay">

        <div id="topBar">

            <h1>ENGLISHVR AI</h1>

            <div id="location">
                ✈ Heathrow Airport
            </div>

        </div>

        <div id="conversation">

            <div class="ai">

                <div class="speaker">

                    👩‍✈️ Airport Officer

                </div>

                <div id="aiText">

                    Welcome.<br><br>

                    Press <b>START</b> to begin your check-in.

                </div>

            </div>

        </div>

        <div id="controls">

            <button id="startButton">

                START

            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
